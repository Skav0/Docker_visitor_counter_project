services:
  redis:
    image: redis:latest
    container_name: db_cont
    volumes:
      - redis-data:/app/redis
    env_file:
      - .env



  web:
    
    container_name: app_cont
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "5000:5000"
    


volumes:
  redis-data:
  
